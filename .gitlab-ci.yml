image: oven/bun:1

include:
  - component: $CI_SERVER_FQDN/components/sast/sast@3.4.0

stages:
  - test
  - install
  - verify
  #- deploy

variables:
  # Caching configuration
  BUN_INSTALL_CACHE_DIR: ".bun-install-cache"

# Global Cache Definition
cache:
  key:
    files:
      - bun.lock
  paths:
    - node_modules/

# Install Dependencies
.install_dependencies:
  stage: install
  script:
    # Use --ignore-scripts to skip native module compilation (like better-sqlite3) which fails in minimal CI environments.
    # This is safe because we target Cloudflare Workers and use D1 at runtime.
    - bun install --frozen-lockfile --ignore-scripts
    # Manually run cf-typegen since --ignore-scripts skips the postinstall hook.
    # This ensures types for D1, R2, etc. are available for the 'verify' stage.
    - bun run cf-typegen
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

.test_unit:
  stage: verify
  needs: []
  script:
    - bun run test:unit
