image: oven/bun:1

stages:
  - install
  - verify
  - deploy

variables:
  # Caching configuration
  BUN_INSTALL_CACHE_DIR: ".bun-install-cache"

# Global Cache Definition
cache:
  key:
    files:
      - bun.lock
  paths:
    - node_modules/

# Install Dependencies
install_dependencies:
  stage: install
  script:
    # Use --ignore-scripts to skip native module compilation (like better-sqlite3) which fails in minimal CI environments.
    # This is safe because we target Cloudflare Workers and use D1 at runtime.
    - bun install --frozen-lockfile --ignore-scripts
    # Manually run cf-typegen since --ignore-scripts skips the postinstall hook.
    # This ensures types for D1, R2, etc. are available for the 'verify' stage.
    - bun run cf-typegen
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

# Verification Jobs (DAG: ALL run in parallel after install)
lint:
  stage: verify
  needs: ["install_dependencies"]
  script:
    - bun run lint

typecheck:
  stage: verify
  needs: ["install_dependencies"]
  script:
    - bun run typecheck

test_unit:
  stage: verify
  needs: ["install_dependencies"]
  script:
    - bun run test:unit

# Production Deployment (Runs only on main branch, after verification passes)
deploy_production:
  stage: deploy
  needs: ["lint", "typecheck", "test_unit"]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  variables:
    WRANGLER_SEND_METRICS: "false"
  script:
    # Build the application once
    - bun run build
    
    # Run Database Migrations (Wrangler skips confirmation in CI/CD)
    - echo "Applying D1 Migrations to Production..."
    - bun x wrangler d1 migrations apply DB --remote
    
    # Deploy Worker (Wrangler is non-interactive by default in CI)
    - echo "Deploying to Cloudflare Workers..."
    - bun x wrangler deploy build/server/index.js
