name: Ration
options:
  bundleIdPrefix: com.mayutic
  developmentTeam: M2KJH5GDGH
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  fileTypes:
    xcprivacy:
      buildPhase: resources

settings:
  base:
    MARKETING_VERSION: "1.1.14"
    CURRENT_PROJECT_VERSION: "10"
    SWIFT_VERSION: "5.9"
    # Set your Apple Developer Team ID here (must match App Store Connect / AASA).
    DEVELOPMENT_TEAM: "M2KJH5GDGH"
    CODE_SIGN_STYLE: Automatic
    # Google Sign-In iOS OAuth client ID (public). Override locally or in CI.
    GOOGLE_IOS_CLIENT_ID: "532985683271-7caopm22f546toe655d0fgva1e4ivr9d.apps.googleusercontent.com"
    # Reversed client ID URL scheme — com.googleusercontent.apps.<id-prefix>
    GOOGLE_IOS_URL_SCHEME: "com.googleusercontent.apps.532985683271-7caopm22f546toe655d0fgva1e4ivr9d"

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.1"

targets:
  Ration:
    type: application
    platform: iOS
    sources:
      - path: Ration
    entitlements:
      path: Ration/App/Ration.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:ration.mayutic.com
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mayutic.ration
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Ration/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: RevenueCat
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: MarkdownUI
  RationTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RationTests
    dependencies:
      - target: Ration
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mayutic.ration.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Ration.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Ration"
        BUNDLE_LOADER: "$(TEST_HOST)"
