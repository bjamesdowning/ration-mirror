name: Ration
options:
  bundleIdPrefix: com.mayutic
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    # Set your Apple Developer Team ID here (must match App Store Connect / AASA).
    DEVELOPMENT_TEAM: ""

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"

targets:
  Ration:
    type: application
    platform: iOS
    sources:
      - path: Ration
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mayutic.ration
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Ration/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: RevenueCat
  RationTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RationTests
    dependencies:
      - target: Ration
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mayutic.ration.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Ration.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Ration"
        BUNDLE_LOADER: "$(TEST_HOST)"
